name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: netcheck

jobs:
  build-static:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            platform: linux-x86_64
            use-cross: false
          - target: aarch64-unknown-linux-musl
            platform: linux-aarch64
            use-cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install native musl toolchain
        if: ${{ !matrix.use-cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: ${{ matrix.use-cross }}
        run: cargo install cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target "${{ matrix.target }}"
          else
            cargo build --release --locked --target "${{ matrix.target }}"
          fi

      - name: Package release archive
        run: ./scripts/package-release.sh "${{ github.ref_name }}" "${{ matrix.target }}" "${{ matrix.platform }}"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  package-native-linux:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            deb_glob: target/debian/*_amd64.deb
            rpm_glob: target/generate-rpm/*.x86_64.rpm
            rpm_arch: x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            deb_glob: target/debian/*_arm64.deb
            rpm_glob: target/generate-rpm/*.aarch64.rpm
            rpm_arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: native-packages-${{ matrix.target }}

      - name: Install packaging tools
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Build package binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Build Debian package
        run: cargo deb --no-build --target "${{ matrix.target }}"

      - name: Build RPM package
        run: cargo generate-rpm --target "${{ matrix.target }}" --arch "${{ matrix.rpm_arch }}"

      - name: Collect native package assets
        run: ./scripts/collect-release-assets.sh ${{ matrix.deb_glob }} ${{ matrix.rpm_glob }}

      - name: Upload native package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-native-packages-${{ matrix.rpm_arch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-static
      - package-native-linux

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
